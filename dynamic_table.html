<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Table</title>
    <style>
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Dynamic Table</h1>
    <input type="text" id="search" placeholder="Search..." onkeyup="searchTable()">
    <table id="dataTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    <form id="dataForm">
        <input type="text" id="name" placeholder="Name" required>
        <input type="number" id="age" placeholder="Age" required>
        <button type="submit">Add</button>
    </form>

    <script>
        document.getElementById('dataForm').onsubmit = function(e) {
            e.preventDefault();
            addRow();
        };

        function addRow() {
            const name = document.getElementById('name').value;
            const age = document.getElementById('age').value;
            const tableBody = document.getElementById('tableBody');
            const row = document.createElement('tr');
            row.innerHTML = `<td>${name}</td><td>${age}</td><td><button onclick=\"editRow(this)\">Edit</button><button onclick=\"deleteRow(this)\">Delete</button></td>`;
            tableBody.appendChild(row);
            saveData();
            document.getElementById('dataForm').reset();
        }

        function editRow(button) {
            const row = button.parentNode.parentNode;
            const name = row.cells[0].innerText;
            const age = row.cells[1].innerText;
            document.getElementById('name').value = name;
            document.getElementById('age').value = age;
            deleteRow(button);
        }

        function deleteRow(button) {
            const row = button.parentNode.parentNode;
            row.parentNode.removeChild(row);
            saveData();
        }

        function searchTable() {
            const query = document.getElementById('search').value.toLowerCase();
            const rows = document.querySelectorAll('#dataTable tbody tr');
            rows.forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(query) ? '' : 'none';
            });
        }

        function saveData() {
            const rows = [...document.querySelectorAll('#dataTable tbody tr')].map(row => ({
                name: row.cells[0].innerText,
                age: row.cells[1].innerText
            }));
            localStorage.setItem('tableData', JSON.stringify(rows));
        }

        function loadData() {
            const data = JSON.parse(localStorage.getItem('tableData')) || [];
            data.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${item.name}</td><td>${item.age}</td><td><button onclick=\"editRow(this)\">Edit</button><button onclick=\"deleteRow(this)\">Delete</button></td>`;
                document.getElementById('tableBody').appendChild(row);
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
