<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Table</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px 12px;
            border: 1px solid #ccc;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .button {
            margin: 5px;
        }
    </style>
</head>
<body>
    <h2>Dynamic Table</h2>
    <table id="dynamicTable">
        <thead>
            <tr>
                <th>Item</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" id="itemInput" placeholder="Add new item"></td>
                <td><button class="button" onclick="addRow()">Add</button></td>
            </tr>
        </tbody>
    </table>
    <script>
        function addRow() {
            var table = document.getElementById("dynamicTable").getElementsByTagName('tbody')[0];
            var newItem = document.getElementById("itemInput").value;
            if(newItem.trim() !== '') {
                var newRow = table.insertRow();
                var cell1 = newRow.insertCell(0);
                var cell2 = newRow.insertCell(1);
                cell1.innerHTML = newItem;
                cell2.innerHTML = '<button class="button" onclick="editRow(this)">Edit</button> <button class="button" onclick="deleteRow(this)">Delete</button>';
                document.getElementById("itemInput").value = '';
            }
        }
        function editRow(button) {
            var row = button.parentNode.parentNode;
            var cell = row.getElementsByTagName("td")[0];
            var currentValue = cell.innerHTML;
            var newValue = prompt("Edit item:", currentValue);
            if (newValue !== null && newValue.trim() !== '') {
                cell.innerHTML = newValue;
            }
        }
        function deleteRow(button) {
            var row = button.parentNode.parentNode;
            row.parentNode.removeChild(row);
        }
    </script>
</body>
</html>
